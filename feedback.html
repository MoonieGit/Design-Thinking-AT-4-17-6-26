<!DOCTYPE html>
<html lang="en">

<!-- HEAD - This is the head of the site, metadata goes here such as CSS linking and site title -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Thinking - AT4 </title>

    <link rel="stylesheet" href="./style.css">
    
</head>

<!-- BODY - This is the body of the site, the viewable content goes here -->
<body>
    <!-- NAVIGATION -->
    <nav>
        <!-- Your site logo should go here, it should also be clickable and send you to the home page -->
        <div id="logo">
            
            <a href="index.html">
                <img src="images/Kanganlogo.png" width=100 height=50>
            </a>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="prototype1.html">Prototype 1</a></li>

            <li><a href="prototype2.html">Prototype 2</a></li>

            <li><a href="final.html">Final Design</a></li>

            <li><a href="contact.html">Contact Me</a></li>

        </ul>
    </nav>

    <!-- MAIN - The page content goes here, it may be different for each page -->

    <main>
            
        <h1>Feedback Form for you!</h1>

        <form action="#" method="post">
            <!-- Name -->
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required placeholder="Your name"><br><br>

            <!-- Email or Contact Method -->
            <label for="contact-method">Preferred contact method:</label><br>
            <select id="contact-method" name="contact_method">
            <option value="email">Email</option>
            <option value="phone">Phone</option>
            <option value="other">Other</option>
            </select><br><br>

            <!-- Email / Text Field -->
            <label for="contact-detail">Email or contact detail:</label><br>
            <input type="email" id="contact-detail" name="contact_detail" placeholder="you@email.com"><br><br>

            <!-- Reason for Enquiry or Feedback -->
            <label for="reason">Reason for enquiry or feedback:</label><br>
            <textarea id="reason" name="reason" rows="4" cols="40" placeholder="Tell me what are you thinking..."></textarea><br><br>

            <!-- Prototype Preference or Interest (Dropdown) -->
            <label for="prototype">Prototype preference / interest:</label><br>
            <select id="prototype" name="prototype_preference">
            <option value="">-- Please choose --</option>
            <option value="esp32_case">ESP32-C3 Zero case</option>
            <option value="cane_holder">Cane holder / accessibility hardware</option>
            <option value="web_ui">Web UI / front-end</option>
            <option value="other">Other</option>
            </select><br><br>

            

            <!-- Submit Control -->
            <button type="submit">Submit Feedback</button>
        </form>

        
    </main>
    
    
    <!-- FOOTER - This is the footer of the site (what is at the bottom of the page) -->
    <footer>
        <p>
            Design Thinking - AT4 © 2026
        </p>
    </footer>

</body>
</html>
